name: Build and Deploy with AZD

# When this action will be executed
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read


jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          push: false
          tags: jetzlstorfer/wattpilot-export:pr-${{ github.sha }}
          build-args: |
            GIT_SHA=${{ github.sha }}
          context: .

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install AZD
        uses: Azure/setup-azd@v2

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.WATTPILOT_AZURE_CLIENT_ID }}
          subscription-id: ${{ secrets.WATTPILOT_AZURE_SUBSCRIPTION_ID }}
          tenant-id: ${{ secrets.WATTPILOT_AZURE_TENANT_ID }}

      - name: AZD Login
        run: azd auth login --client-id ${{ secrets.WATTPILOT_AZURE_CLIENT_ID }} --federated-credential-provider github --tenant-id ${{ secrets.WATTPILOT_AZURE_TENANT_ID }}

      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.WATTPILOT_REGISTRY_USERNAME }}
          password: ${{ secrets.WATTPILOT_REGISTRY_PASSWORD }}

      - name: Deploy via AZD (deploy only)
        run: |
          azd env new wattpilot-prod --no-prompt
          azd env set AZURE_SUBSCRIPTION_ID ${{ secrets.WATTPILOT_AZURE_SUBSCRIPTION_ID }}
          azd env set AZURE_LOCATION swedencentral
          azd env set DOCKER_USERNAME ${{ secrets.WATTPILOT_REGISTRY_USERNAME }}
          azd env set DOCKER_PASSWORD ${{ secrets.WATTPILOT_REGISTRY_PASSWORD }}
          azd deploy --no-prompt
