name: Build and deploy on Azure container apps

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
  pull_request_target:
    branches: 
      [ main ]
  # Allow mannually trigger 
  workflow_dispatch:      

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      #- name: Checkout to the branch
      #  uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.WATTPILOT_REGISTRY_USERNAME }}
          password: ${{ secrets.WATTPILOT_REGISTRY_PASSWORD }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: jetzlstorfer/wattpilot-export:${{ github.sha }}
          #file: ./src/Dockerfile
          build-args: GIT_SHA=${{ github.sha }}
          context: "{{defaultContext}}:src"


  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.WATTPILOT_AZURE_CLIENT_ID }}
          subscription-id: ${{ secrets.WATTPILOT_AZURE_SUBSCRIPTION_ID }}
          tenant-id: ${{ secrets.WATTPILOT_AZURE_TENANT_ID }}


      - name: Deploy to containerapp
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az config set extension.use_dynamic_install=yes_without_prompt
            az containerapp registry set -n wattpilot -g aca-wattpilot --server docker.io --username  ${{ secrets.WATTPILOT_REGISTRY_USERNAME }} --password ${{ secrets.WATTPILOT_REGISTRY_PASSWORD }}
            az containerapp update -n wattpilot -g aca-wattpilot --image jetzlstorfer/wattpilot-export:${{ github.sha }}
