name: Build and Deploy with AZD

# When this action will be executed
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read


jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (no push)
        uses: docker/build-push-action@v7
        with:
          push: false
          tags: jetzlstorfer/wattpilot-export:pr-${{ github.sha }}
          build-args: |
            GIT_SHA=${{ github.sha }}
          context: .

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install AZD
        uses: Azure/setup-azd@v2

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.WATTPILOT_AZURE_CLIENT_ID }}
          subscription-id: ${{ secrets.WATTPILOT_AZURE_SUBSCRIPTION_ID }}
          tenant-id: ${{ secrets.WATTPILOT_AZURE_TENANT_ID }}

      - name: AZD Login
        run: azd auth login --client-id ${{ secrets.WATTPILOT_AZURE_CLIENT_ID }} --federated-credential-provider github --tenant-id ${{ secrets.WATTPILOT_AZURE_TENANT_ID }}

      - name: Docker Hub Login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.WATTPILOT_REGISTRY_USERNAME }}
          password: ${{ secrets.WATTPILOT_REGISTRY_PASSWORD }}

      - name: Deploy via AZD (provision + deploy)
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.WATTPILOT_AZURE_SUBSCRIPTION_ID }}
          WATTPILOT_KEY: ${{ secrets.WATTPILOT_KEY }}
          DOCKER_USERNAME: ${{ secrets.WATTPILOT_REGISTRY_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.WATTPILOT_REGISTRY_PASSWORD }}
          ENTRA_CLIENT_ID: ${{ secrets.ENTRA_CLIENT_ID }}
          ENTRA_CLIENT_SECRET: ${{ secrets.ENTRA_CLIENT_SECRET }}
        run: |
          set -euo pipefail

          if [[ -z "$AZURE_SUBSCRIPTION_ID" ]]; then
            echo "Missing required secret: WATTPILOT_AZURE_SUBSCRIPTION_ID" >&2
            exit 1
          fi
          if [[ -z "$WATTPILOT_KEY" ]]; then
            echo "Missing required secret: WATTPILOT_KEY" >&2
            exit 1
          fi
          if [[ -z "$DOCKER_USERNAME" ]]; then
            echo "Missing required secret: WATTPILOT_REGISTRY_USERNAME" >&2
            exit 1
          fi
          if [[ -z "$DOCKER_PASSWORD" ]]; then
            echo "Missing required secret: WATTPILOT_REGISTRY_PASSWORD" >&2
            exit 1
          fi

          azd env new wattpilot-prod --no-prompt
          azd env set AZURE_SUBSCRIPTION_ID "$AZURE_SUBSCRIPTION_ID"
          azd env set AZURE_LOCATION swedencentral
          azd env set WATTPILOT_KEY "$WATTPILOT_KEY"
          azd env set DOCKER_USERNAME "$DOCKER_USERNAME"
          azd env set DOCKER_PASSWORD "$DOCKER_PASSWORD"
          if [[ -n "${ENTRA_CLIENT_ID:-}" && -n "${ENTRA_CLIENT_SECRET:-}" ]]; then
            azd env set ENTRA_CLIENT_ID "$ENTRA_CLIENT_ID"
            azd env set ENTRA_CLIENT_SECRET "$ENTRA_CLIENT_SECRET"
          fi
          azd provision --no-prompt
          azd deploy --no-prompt
