name: Trigger auto deployment for wattpilot

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/wattpilot-AutoDeployTrigger-0a689c97-2e7b-4a98-abf4-ddb392a6b9b8.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.WATTPILOT_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.WATTPILOT_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.WATTPILOT_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          registryUrl: 
          registryUsername: ${{ secrets.WATTPILOT_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.WATTPILOT_REGISTRY_PASSWORD }}
          containerAppName: wattpilot
          resourceGroup: aca-wattpilot
          imageToBuild: default/[parameters('containerAppName')]:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


