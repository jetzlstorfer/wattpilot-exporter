# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: wattpilot-exporter
metadata:
  template: wattpilot-exporter

services:
  wattpilot:
    host: containerapp
    project: .
    language: docker
    docker:
      path: Dockerfile
      context: .
      registry: docker.io
      image: jetzlstorfer/wattpilot-export
      # Tag format: <env-name>-<timestamp>
      # azd auto-generates a timestamp-based tag for each deployment
