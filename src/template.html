<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.simplecss.org/simple.min.css">
    <title>Energy and Price Calculator</title>
</head>
<body>
    <h1>Wattpilot Energy and Price Calculator</h1>
    <p><a href="?date={{ .PrevMonth }}">{{ .PrevMonth }}</a> <strong>{{ .Date }}</strong> <a href="?date={{ .NextMonth }}">{{ .NextMonth }}</a></a></p>
    <p>Total Energy: {{ printf "%.2f" .TotalEnergy}} kWh</p>
    <p>Total Price: {{printf "%.2f" .TotalPrice}} €</p>
</body>
</html>
